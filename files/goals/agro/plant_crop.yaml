# GoalSpec: plant_crop
# Equivalent to PlantCropGoal.java
# Activates when there are lands in PLANTING season.

id: plant_crop
version: "1.0"
display_name: "Sembrar Cultivo"
description: "Sow seeds in the prepared land."
pyramid_level: ATTENTION_CYCLE
plan_ref: plant_crop_plan_v1

# Check if any land is ready for planting
activation_when: "state.hasLandWithSeason('PLANTING')"

contribution_rules:
  fixed_value: 0.7
