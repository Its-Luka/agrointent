# GoalSpec: spend_friends_time
# Equivalent to SpendFriendsTimeGoal.java
# Active when neighbors are available.

id: spend_friends_time
version: "1.0"
display_name: "Pasar tiempo con Amigos"
description: "Spend time with neighbors and friends."
pyramid_level: ATTENTION_CYCLE
plan_ref: spend_friends_time_plan_v1

activation_when: "true"

contribution_rules:
  fuzzy_inputs:
    - name: affinity
      source: peasant_friends_affinity
      range: [0, 1]
  rules:
    - if: "affinity is HIGH"
      then: "contribution is HIGH"
    - if: "affinity is MEDIUM"
      then: "contribution is MEDIUM"
    - if: "affinity is LOW"
      then: "contribution is LOW"
