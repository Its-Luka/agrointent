# PlanSpec: leisure_activities_plan_v1
# Equivalent to LeisureActivitiesTask.java execution

id: leisure_activities_plan_v1
version: "1.0"
description: "Engage in leisure activities."

steps:
  - id: consume_all_time
    action: consume_resource
    args:
      key: time_left_on_day
      amount: 1440

  - id: emit_leisure_emotion
    action: emit_emotion
    args:
      event: "FAMILY"
      type: "LEISURE"
      charac: "TIME"

  - id: record_leisure_episode
    action: emit_episode
    args:
      text: "He dedicado parte de mi tiempo y recursos a actividades de ocio personal."
      tags: [leisure, activity]

on_timeout: []
on_failure: []
