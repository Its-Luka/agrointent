# PlanSpec: spend_friends_time_plan_v1
# Equivalent to SpendFriendsTimeTask.java execution

id: spend_friends_time_plan_v1
version: "1.0"
description: "Spend time with friends/neighbors."

steps:
  - id: friends_logic
    action: spend_friends_time
    args: {}

  - id: record_friends_episode
    action: emit_episode
