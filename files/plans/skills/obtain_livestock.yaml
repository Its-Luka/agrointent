# PlanSpec: obtain_livestock_plan_v1
# Equivalent to ObtainLivestockTask.java execution
# Sends BUY_LIVESTOCK event to MarketPlace.

id: obtain_livestock_plan_v1
version: "1.0"
description: "Purchase livestock from the MarketPlace agent."

steps:
  - id: consume_livestock_time
    action: consume_resource
    args:
      key: time_left_on_day
      time_key: ObtainLivestockTask

  - id: buy_livestock
    action: send_marketplace_event
    args:
      message_type: BUY_LIVESTOCK
      quantity: 1
      reset_resource_needed: false

  - id: record_livestock_episode
    action: emit_episode
    args:
      text: "Compré ganado en el mercado para mi actividad pecuaria."
      tags: [livestock, market, resources]

on_timeout: []
on_failure:
  - id: log_livestock_failure
    action: log_audit
    args:
      level: WARY
      message: "obtain_livestock_plan failed for agent {agent_id}"
